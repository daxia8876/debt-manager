<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>债务管家 V14</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --ink: #1a1a2e;
      --ink-light: #4a4a6a;
      --paper: #f5f0e8;
      --paper-dark: #ede8dc;
      --accent: #c0392b;
      --accent-light: #e74c3c;
      --gold: #d4a820;
      --gold-light: #f0c94a;
      --green: #1a6b3c;
      --green-light: #27ae60;
      --blue: #1a3a6b;
      --blue-light: #2980b9;
      --border: #c8bfaa;
      --shadow: rgba(26,26,46,0.12);
      --card-bg: #faf7f2;
      --serif: 'Noto Serif SC', serif;
      --sans: 'Noto Sans SC', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(192,57,43,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(26,58,107,0.04) 0%, transparent 50%);
    }

    /* ===== HEADER ===== */
    .app-header {
      background: var(--ink);
      color: var(--paper);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px var(--shadow);
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header-title {
      font-family: var(--serif);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-badge {
      background: var(--accent);
      color: white;
      font-size: 0.65rem;
      font-family: var(--mono);
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.1em;
    }
    .header-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(245,240,232,0.2);
      background: rgba(245,240,232,0.08);
      color: var(--paper);
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-header:hover { background: rgba(245,240,232,0.18); border-color: rgba(245,240,232,0.4); }
    .btn-header.primary { background: var(--accent); border-color: var(--accent); }
    .btn-header.primary:hover { background: var(--accent-light); }

    /* ===== LAYOUT ===== */
    .main-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ===== STATS STRIP ===== */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px var(--shadow);
    }
    .stat-cell {
      background: var(--card-bg);
      padding: 16px 12px;
      text-align: center;
      transition: background 0.2s;
    }
    .stat-cell:hover { background: var(--paper-dark); }
    .stat-label {
      font-size: 0.7rem;
      color: var(--ink-light);
      letter-spacing: 0.05em;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--ink);
    }
    .stat-value.red { color: var(--accent); }
    .stat-value.gold { color: var(--gold); }
    .stat-value.green { color: var(--green); }
    .stat-value.blue { color: var(--blue); }

    /* ===== SECTION TITLE ===== */
    .section-title {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
      margin-left: 8px;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    /* ===== TWO-COL ===== */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    /* ===== CHANGE RECORDS ===== */
    .change-list {
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 4px;
    }
    .change-list::-webkit-scrollbar { width: 4px; }
    .change-list::-webkit-scrollbar-track { background: transparent; }
    .change-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .record-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--paper);
      border: 1px solid var(--border);
      font-size: 0.82rem;
    }
    .record-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .record-dot.pos { background: var(--accent); }
    .record-dot.neg { background: var(--green); }
    .record-meta { flex: 1; min-width: 0; }
    .record-amount {
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .record-amount.pos { color: var(--accent); }
    .record-amount.neg { color: var(--green); }
    .record-time { color: var(--ink-light); font-size: 0.72rem; }
    .record-reason { color: var(--ink-light); font-size: 0.75rem; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .record-actions { display: flex; gap: 4px; }
    .record-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-light);
      font-size: 0.75rem;
      padding: 3px 5px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .record-btn:hover { background: var(--paper-dark); color: var(--ink); }

    /* ===== CALENDAR ===== */
    .cal-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--ink-light);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 0.78rem;
      background: var(--paper);
      border: 1px solid transparent;
      position: relative;
      transition: all 0.15s;
    }
    .cal-day.empty { background: transparent; border: none; }
    .cal-day.has-debt { background: #fff9e6; border-color: var(--gold); }
    .cal-day.today { border-color: var(--accent) !important; background: #fff0ee !important; }
    .cal-amount {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--gold);
      font-weight: 600;
      line-height: 1;
      margin-top: 1px;
    }

    /* ===== CHART ===== */
    #historyChart { max-height: 200px; }

    /* ===== DEBT LIST ===== */
    .debt-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }

    .debt-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px var(--shadow);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .debt-card:hover { box-shadow: 0 6px 20px var(--shadow); }
    .debt-card.settled { opacity: 0.7; }

    .debt-card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .debt-color-bar {
      width: 4px;
      align-self: stretch;
      border-radius: 4px;
      background: var(--accent);
      flex-shrink: 0;
    }
    .debt-color-bar.settled-bar { background: var(--green); }
    .debt-color-bar.blue-bar { background: var(--blue); }
    .debt-color-bar.gold-bar { background: var(--gold); }

    .debt-name-row { flex: 1; min-width: 0; }
    .debt-name {
      font-family: var(--serif);
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .type-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }
    .type-badge.normal { background: #e8eaf6; color: var(--blue); }
    .type-badge.equal { background: #e8f5e9; color: var(--green); }
    .type-badge.daily { background: #fff3e0; color: #c0621b; }
    .type-badge.settled { background: #e8f5e9; color: var(--green); }

    .debt-rate {
      font-size: 0.75rem;
      color: var(--ink-light);
      margin-top: 3px;
      font-family: var(--mono);
    }

    .debt-amounts {
      text-align: right;
      flex-shrink: 0;
    }
    .debt-total {
      font-family: var(--mono);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
    }
    .debt-total.settled-amt { color: var(--green); }
    .debt-breakdown {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--ink-light);
      margin-top: 2px;
    }

    /* Progress bar */
    .progress-wrap {
      padding: 0 20px 10px;
      padding-top: 12px;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--ink-light);
      margin-bottom: 5px;
      font-family: var(--mono);
    }
    .progress-bar {
      height: 5px;
      background: var(--paper-dark);
      border-radius: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-light), var(--green));
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    /* Installments */
    .installment-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--paper);
      border: none;
      border-top: 1px solid var(--border);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink-light);
      font-family: var(--sans);
      transition: background 0.15s;
    }
    .installment-toggle:hover { background: var(--paper-dark); }
    .toggle-arrow { transition: transform 0.2s; font-size: 0.7rem; }
    .toggle-arrow.open { transform: rotate(90deg); }

    .installment-panel {
      display: none;
      padding: 12px 20px;
      background: var(--paper);
      border-top: 1px solid var(--border);
      max-height: 220px;
      overflow-y: auto;
    }
    .installment-panel.open { display: block; }
    .inst-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      margin-bottom: 4px;
      cursor: pointer;
      border-left: 3px solid var(--border);
      transition: all 0.15s;
    }
    .inst-row:hover:not(.paid-row) { background: #e8f0fe; border-left-color: var(--blue-light); }
    .inst-row.paid-row { border-left-color: var(--green); background: #f1f8f4; cursor: default; color: var(--ink-light); }
    .inst-num { font-family: var(--mono); font-weight: 600; color: var(--ink-light); width: 32px; }
    .inst-amounts { font-family: var(--mono); font-size: 0.75rem; color: var(--ink); flex: 1; text-align: center; }
    .inst-status { font-size: 0.72rem; }

    /* Debt actions */
    .debt-actions {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      background: var(--paper);
      flex-wrap: wrap;
    }
    .action-btn {
      flex: 1;
      min-width: 80px;
      padding: 8px 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      font-family: var(--sans);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--ink);
    }
    .action-btn:hover { background: var(--paper-dark); }
    .action-btn.pay { border-color: var(--green); color: var(--green); }
    .action-btn.pay:hover { background: #f0fdf4; }
    .action-btn.payoff { border-color: var(--blue); color: var(--blue); }
    .action-btn.payoff:hover { background: #eff4ff; }
    .action-btn.edit { border-color: var(--gold); color: #8a6e00; }
    .action-btn.edit:hover { background: #fffbf0; }
    .action-btn.del { border-color: var(--accent); color: var(--accent); }
    .action-btn.del:hover { background: #fff5f5; }

    /* ===== SETTLED SECTION ===== */
    .settled-toggle-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      font-family: var(--serif);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--ink);
      box-shadow: 0 2px 8px var(--shadow);
      transition: background 0.15s;
      margin-bottom: 14px;
    }
    .settled-toggle-btn:hover { background: var(--paper-dark); }

    /* ===== MODAL OVERLAY ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.55);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.3);
      animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes modalIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .modal-title {
      font-family: var(--serif);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink-light);
      margin-bottom: 5px;
      letter-spacing: 0.03em;
    }
    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--paper);
      font-family: var(--sans);
      font-size: 0.88rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(192,57,43,0.1); }
    .form-input.small { width: 100px; }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .modal-btn {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      border: none;
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .modal-btn.confirm { background: var(--ink); color: var(--paper); }
    .modal-btn.confirm:hover { background: #2d2d4e; }
    .modal-btn.cancel { background: var(--paper-dark); color: var(--ink); }
    .modal-btn.cancel:hover { background: var(--border); }

    /* ===== NOTICE ===== */
    .notice {
      background: #f5f0e0;
      border: 1px solid var(--gold);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: #7a5c00;
      margin-bottom: 14px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-light);
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-text { font-family: var(--serif); font-size: 0.95rem; }

    /* ===== SCROLLBAR ===== */
    .installment-panel::-webkit-scrollbar { width: 4px; }
    .installment-panel::-webkit-scrollbar-track { background: transparent; }
    .installment-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 680px) {
      .stats-strip { grid-template-columns: repeat(3, 1fr); }
      .two-col { grid-template-columns: 1fr; }
      .header-inner { flex-wrap: wrap; }
      .header-title { font-size: 1.1rem; }
      .btn-header { padding: 7px 12px; font-size: 0.75rem; }
      .debt-total { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-inner">
    <div class="header-title">
      📒 债务管家
      <span class="header-badge">V14</span>
    </div>
    <div class="header-actions">
      <button class="btn-header" onclick="exportData()">📤 导出</button>
      <label class="btn-header" style="cursor:pointer">
        📂 导入
        <input type="file" id="importFile" accept=".json" class="hidden" style="display:none" onchange="importData(event)">
      </label>
      <button class="btn-header primary" onclick="openAddDebt()">＋ 新增债务</button>
    </div>
  </div>
</header>

<div class="main-wrap">

  <!-- STATS -->
  <div class="stats-strip">
    <div class="stat-cell">
      <div class="stat-label">债务总额</div>
      <div class="stat-value red" id="stat_totalGross">¥0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">总利息</div>
      <div class="stat-value gold" id="stat_totalInterestGross">¥0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">剩余本金</div>
      <div class="stat-value red" id="stat_remainingPrincipal">¥0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">剩余利息</div>
      <div class="stat-value gold" id="stat_remainingInterest">¥0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">已结清</div>
      <div class="stat-value green" id="stat_settledCount">0笔</div>
    </div>
  </div>

  <!-- TWO COL: RECORDS + CALENDAR -->
  <div class="two-col">
    <!-- Change Records -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="section-title" style="margin-bottom:0">📝 变动记录</div>
        <button onclick="addManualRecord()" style="font-size:0.75rem;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--paper);cursor:pointer;font-family:var(--sans);color:var(--ink);transition:background 0.15s" onmouseover="this.style.background='var(--paper-dark)'" onmouseout="this.style.background='var(--paper)'">＋ 手动记录</button>
      </div>
      <div class="change-list" id="changeRecordsList">
        <div class="empty-state" style="padding:20px">
          <div class="empty-text">操作债务后自动生成记录</div>
        </div>
      </div>
    </div>

    <!-- Calendar -->
    <div class="card">
      <div class="section-title">📅 本月还款日历 <span id="calendarMonthYear" style="font-family:var(--mono);font-size:0.8rem;font-weight:400;color:var(--ink-light)"></span></div>
      <div class="cal-header">
        <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
      </div>
      <div class="cal-grid" id="calendarGrid"></div>
      <p style="font-size:0.7rem;color:var(--ink-light);margin-top:10px">🟡 高亮日期为该日还款总额</p>
    </div>
  </div>

  <!-- CHART -->
  <div class="card" style="margin-bottom:24px">
    <div class="section-title">📈 历史变化曲线</div>
    <canvas id="historyChart"></canvas>
    <div style="display:flex;gap:20px;justify-content:center;margin-top:10px;font-size:0.72rem;color:var(--ink-light)">

<script>
// ========== DATA ==========
let debts = JSON.parse(localStorage.getItem('debts_v14')) || [];
let changeRecords = JSON.parse(localStorage.getItem('changeRecords_v14')) || [];
let historySnapshots = JSON.parse(localStorage.getItem('historySnapshots_v14')) || [];

// Migration from V13 keys
if (debts.length === 0) {
  const old = localStorage.getItem('debts');
  if (old) try { debts = JSON.parse(old); } catch(e) {}
}
if (changeRecords.length === 0) {
  const old = localStorage.getItem('changeRecords');
  if (old) try { changeRecords = JSON.parse(old); } catch(e) {}
}
if (historySnapshots.length === 0) {
  const old = localStorage.getItem('historySnapshots');
  if (old) try { historySnapshots = JSON.parse(old); } catch(e) {}
}

let currentEditIndex = -1;
let currentChangeIndex = -1;
let currentPayoffIndex = -1;
let currentPaymentIndex = -1;
let historyChart = null;

function save() {
  localStorage.setItem('debts_v14', JSON.stringify(debts));
  localStorage.setItem('changeRecords_v14', JSON.stringify(changeRecords));
  localStorage.setItem('historySnapshots_v14', JSON.stringify(historySnapshots));
  renderAll();
}

// ========== MATH ==========
function isSettled(d) {
  if (d.type === 'normal') return (d.balance || 0) <= 0.01;
  if (d.type === 'equal') return (d.periodsPaid || 0) >= (d.periods || 0);
  if (d.type === 'daily') return (d.dailyPaid || 0) >= (d.dailyPeriods || 0);
  return false;
}

function calcDetails(d) {
  let paidPrincipal = 0, paidInterest = 0, remainingPrincipal = 0, remainingInterest = 0;
  let installments = [];
  const type = d.type || 'normal';

  if (type === 'normal') {
    remainingPrincipal = d.balance || 0;
    paidInterest = d.paidInterest || 0;
    installments.push({ period: 1, due: '当前本金', principalPart: remainingPrincipal, interestPart: 0, paid: false });
  } else if (type === 'equal') {
    const P = d.principal || 0, n = d.periods || 1, paid = Math.min(d.periodsPaid || 0, n);
    const r = (d.rateAnnual || 0) / 100 / 12;
    let totalInterest = 0;
    if (P > 0 && n > 0) {
      if (r > 0) totalInterest = P * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1) * n - P;
      const avgP = P / n, avgI = totalInterest / n;
      for (let i = 1; i <= n; i++) {
        if (i <= paid) { paidPrincipal += avgP; paidInterest += avgI; }
        else { remainingPrincipal += avgP; remainingInterest += avgI; }
        installments.push({ period: i, due: `第${i}期`, principalPart: avgP, interestPart: avgI, paid: i <= paid });
      }
    }
  } else if (type === 'daily') {
    const P = d.dailyPrincipal || 0, n = d.dailyPeriods || 1, paid = Math.min(d.dailyPaid || 0, n);
    const dr = (d.dailyRate || 0) / 100 / 365;
    if (P > 0 && n > 0) {
      const avgP = P / n; let rem = P;
      for (let i = 1; i <= n; i++) {
        const ipt = rem * dr * 30;
        if (i <= paid) { paidPrincipal += avgP; paidInterest += ipt; rem -= avgP; }
        else { remainingPrincipal += avgP; remainingInterest += ipt; }
        installments.push({ period: i, due: `第${i}期`, principalPart: avgP, interestPart: ipt, paid: i <= paid });
      }
    }
  }
  return { paidPrincipal, paidInterest, remainingPrincipal, remainingInterest, installments };
}

function getStats() {
  let totalGross = 0, totalInterest = 0, remP = 0, remI = 0, settled = 0;
  debts.forEach(d => {
    const s = isSettled(d);
    if (s) settled++;
    const det = calcDetails(d);
    totalGross += det.remainingPrincipal + det.remainingInterest + det.paidPrincipal + det.paidInterest;
    totalInterest += det.paidInterest + det.remainingInterest;
    if (!s) { remP += det.remainingPrincipal; remI += det.remainingInterest; }
  });
  return { totalGross, totalInterest, remP, remI, settled };
}

// ========== SNAPSHOT ==========
function snap(action) {
  const s = getStats();
  historySnapshots.push({ timestamp: Date.now(), action, totalGross: s.totalGross, totalInterest: s.totalInterest, remainingPrincipal: s.remP, remainingInterest: s.remI });
  if (historySnapshots.length > 120) historySnapshots.shift();
}

function addRecord(type, amount, direction, reason) {
  changeRecords.push({ type, amount: Math.abs(amount), direction, reason, timestamp: Date.now() });
}

// ========== EXPORT/IMPORT ==========
function exportData() {
  const content = JSON.stringify({ debts, changeRecords, historySnapshots }, null, 2);
  const filename = `债务数据_${new Date().toISOString().slice(0,10)}.json`;
  if (window.AndroidBridge) {
    window.AndroidBridge.saveFile(content, filename);
  } else {
    const blob = new Blob([content], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }
}
function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (d.debts) debts = d.debts;
      if (d.changeRecords) changeRecords = d.changeRecords;
      if (d.historySnapshots) historySnapshots = d.historySnapshots;
      save(); alert('导入成功 ✓');
    } catch { alert('文件格式错误'); }
    finally { e.target.value = ''; }
  };
  reader.readAsText(file);
}

// ========== MODAL HELPERS ==========
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Click outside closes
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ========== DEBT MODAL ==========
function openAddDebt() {
  currentEditIndex = -1;
  document.getElementById('modalTitle').textContent = '📌 新增债务';
  document.getElementById('debtName').value = '';
  document.getElementById('debtType').value = 'normal';
  document.getElementById('repayDay').value = 10;
  ['normalBalance','normalRate','principal','periods','rateAnnual_equal','periodsPaid_equal','dailyPrincipal','dailyRate','dailyPeriods','dailyPaid'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('periodsPaid_equal').value = 0;
  document.getElementById('dailyPaid').value = 0;
  toggleTypeFields();
  openModal('debtModal');
}
function editDebt(idx) {
  currentEditIndex = idx;
  const d = debts[idx];
  document.getElementById('modalTitle').textContent = '✏️ 编辑债务';
  document.getElementById('debtName').value = d.name || '';
  document.getElementById('debtType').value = d.type || 'normal';
  document.getElementById('repayDay').value = d.repayDay || 10;
  if (d.type === 'normal') { document.getElementById('normalBalance').value = d.balance || 0; document.getElementById('normalRate').value = d.rateAnnual || 0; }
  else if (d.type === 'equal') { document.getElementById('principal').value = d.principal || 0; document.getElementById('periods').value = d.periods || 0; document.getElementById('rateAnnual_equal').value = d.rateAnnual || 0; document.getElementById('periodsPaid_equal').value = d.periodsPaid || 0; }
  else if (d.type === 'daily') { document.getElementById('dailyPrincipal').value = d.dailyPrincipal || 0; document.getElementById('dailyRate').value = d.dailyRate || 0; document.getElementById('dailyPeriods').value = d.dailyPeriods || 0; document.getElementById('dailyPaid').value = d.dailyPaid || 0; }
  toggleTypeFields();
  openModal('debtModal');
}
function toggleTypeFields() {
  const t = document.getElementById('debtType').value;
  document.getElementById('normalFields').style.display = t === 'normal' ? '' : 'none';
  document.getElementById('equalFields').style.display = t === 'equal' ? '' : 'none';
  document.getElementById('dailyFields').style.display = t === 'daily' ? '' : 'none';
}
function saveDebt() {
  const name = document.getElementById('debtName').value.trim();
  if (!name) return alert('请输入债务名称');
  const type = document.getElementById('debtType').value;
  const repayDay = Number(document.getElementById('repayDay').value) || 10;
  let debt = { name, type, repayDay, paidInterest: 0 };
  if (type === 'normal') { debt.balance = Number(document.getElementById('normalBalance').value)||0; debt.rateAnnual = Number(document.getElementById('normalRate').value)||0; }
  else if (type === 'equal') {
    debt.principal = Number(document.getElementById('principal').value)||0;
    debt.periods = Number(document.getElementById('periods').value)||0;
    debt.rateAnnual = Number(document.getElementById('rateAnnual_equal').value)||0;
    debt.periodsPaid = Number(document.getElementById('periodsPaid_equal').value)||0;
    if (debt.principal && debt.periods) debt.balance = Math.max(0, debt.principal - debt.periodsPaid * (debt.principal/debt.periods));
  } else if (type === 'daily') {
    debt.dailyPrincipal = Number(document.getElementById('dailyPrincipal').value)||0;
    debt.dailyRate = Number(document.getElementById('dailyRate').value)||0;
    debt.dailyPeriods = Number(document.getElementById('dailyPeriods').value)||0;
    debt.dailyPaid = Number(document.getElementById('dailyPaid').value)||0;
    if (debt.dailyPrincipal && debt.dailyPeriods) debt.balance = Math.max(0, debt.dailyPrincipal - debt.dailyPaid*(debt.dailyPrincipal/debt.dailyPeriods));
  }
  const isNew = currentEditIndex === -1;
  if (isNew) {
    const det = calcDetails(debt);
    const total = det.remainingPrincipal + det.remainingInterest + det.paidPrincipal + det.paidInterest;
    const interest = det.paidInterest + det.remainingInterest;
    addRecord('total', total, 'positive', `新增债务「${name}」`);
    addRecord('interest', interest, 'positive', `新增债务「${name}」`);
    debts.push(debt);
  } else {
    const od = debts[currentEditIndex];
    const od_det = calcDetails(od), nd_det = calcDetails(debt);
    const oTot = od_det.remainingPrincipal + od_det.remainingInterest + od_det.paidPrincipal + od_det.paidInterest;
    const nTot = nd_det.remainingPrincipal + nd_det.remainingInterest + nd_det.paidPrincipal + nd_det.paidInterest;
    const diff = nTot - oTot;
    if (Math.abs(diff) > 0.01) addRecord('total', Math.abs(diff), diff > 0 ? 'positive' : 'negative', `编辑债务「${name}」`);
    debts[currentEditIndex] = debt;
  }
  snap(isNew ? `新增「${name}」` : `编辑「${name}」`);
  closeModal('debtModal');
  save();
}
function deleteDebt(idx) {
  if (!confirm('删除该债务？')) return;
  const d = debts[idx];
  const det = calcDetails(d);
  const total = det.remainingPrincipal + det.remainingInterest + det.paidPrincipal + det.paidInterest;
  addRecord('total', total, 'negative', `删除「${d.name}」`);
  debts.splice(idx, 1);
  snap(`删除「${d.name}」`);
  save();
}

// ========== PAYMENT ==========
function openPayment(idx) {
  currentPaymentIndex = idx;
  const d = debts[idx];
  const det = calcDetails(d);
  document.getElementById('paymentInfo').innerHTML = `债务：<strong>${d.name}</strong><br>剩余本金：¥${det.remainingPrincipal.toFixed(2)}`;
  document.getElementById('paymentAmount').value = '';
  document.getElementById('paymentNote').value = '';
  openModal('paymentModal');
}
function confirmPayment() {
  if (currentPaymentIndex === -1) return;
  const amt = parseFloat(document.getElementById('paymentAmount').value);
  if (isNaN(amt) || amt <= 0) return alert('请输入有效还款金额');
  const note = document.getElementById('paymentNote').value.trim();
  const d = debts[currentPaymentIndex];
  d.balance = Math.max(0, (d.balance || 0) - amt);
  if (d.type === 'equal' && d.periodsPaid < d.periods) d.periodsPaid += 1;
  if (d.type === 'daily' && d.dailyPaid < d.dailyPeriods) d.dailyPaid += 1;
  addRecord('total', amt, 'negative', note || `还款¥${amt}`);
  snap(`还款¥${amt}「${d.name}」`);
  closeModal('paymentModal');
  save();
}

// ========== PAYOFF ==========
function calcNormalTotalInterest(d) {
  if (d.type === 'equal') {
    const P = d.principal||0, n = d.periods||1, r = (d.rateAnnual||0)/100/12;
    return r > 0 ? P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1)*n - P : 0;
  } else if (d.type === 'daily') {
    const P = d.dailyPrincipal||0, n = d.dailyPeriods||1, dr = (d.dailyRate||0)/100/365;
    let tot = 0, rem = P;
    for (let i = 1; i <= n; i++) { tot += rem*dr*30; rem -= P/n; }
    return tot;
  }
  return (d.balance||0) * ((d.rateAnnual||0)/100);
}
function openPayoff(idx) {
  currentPayoffIndex = idx;
  const d = debts[idx], ni = calcNormalTotalInterest(d), det = calcDetails(d);
  document.getElementById('payoffComparison').innerHTML = `债务：<strong>${d.name}</strong><br>正常总利息：<strong>¥${ni.toFixed(2)}</strong> | 已付利息：<strong>¥${det.paidInterest.toFixed(2)}</strong>`;
  document.getElementById('payoffInterestPaid').value = Math.max(0, ni - det.paidInterest).toFixed(2);
  openModal('payoffModal');
}
function confirmPayoff() {
  if (currentPayoffIndex === -1) return;
  const d = debts[currentPayoffIndex];
  const actual = parseFloat(document.getElementById('payoffInterestPaid').value);
  if (isNaN(actual) || actual < 0) return alert('请输入有效利息金额');
  const ni = calcNormalTotalInterest(d), det = calcDetails(d);
  const diff = (det.paidInterest + actual) - ni;
  if (Math.abs(diff) > 0.01) addRecord('interest', Math.abs(diff), diff > 0 ? 'positive' : 'negative', `提前结清「${d.name}」`);
  d.balance = 0;
  if (d.type === 'equal') d.periodsPaid = d.periods;
  if (d.type === 'daily') d.dailyPaid = d.dailyPeriods;
  snap(`提前结清「${d.name}」`);
  closeModal('payoffModal');
  save();
}

// ========== MARK INSTALLMENT ==========
function markInstPaid(debtIdx, periodIdx) {
  const d = debts[debtIdx];
  if (isSettled(d)) return;
  if (d.type === 'equal') {
    if ((d.periodsPaid||0) >= d.periods) return alert('所有期数已还清');
    const det = calcDetails(d);
    const inst = det.installments[periodIdx];
    d.periodsPaid = (d.periodsPaid||0) + 1;
    d.balance = Math.max(0, d.principal - d.periodsPaid * (d.principal/d.periods));
    addRecord('total', inst.principalPart + inst.interestPart, 'negative', `第${periodIdx+1}期已还「${d.name}」`);
    addRecord('interest', inst.interestPart, 'negative', `第${periodIdx+1}期利息「${d.name}」`);
    snap(`第${periodIdx+1}期已还「${d.name}」`);
    save();
  } else if (d.type === 'daily') {
    if ((d.dailyPaid||0) >= d.dailyPeriods) return alert('所有期数已还清');
    const det = calcDetails(d);
    const inst = det.installments[periodIdx];
    d.dailyPaid = (d.dailyPaid||0) + 1;
    d.balance = Math.max(0, d.dailyPrincipal - d.dailyPaid*(d.dailyPrincipal/d.dailyPeriods));
    addRecord('total', inst.principalPart + inst.interestPart, 'negative', `第${periodIdx+1}期已还「${d.name}」`);
    addRecord('interest', inst.interestPart, 'negative', `第${periodIdx+1}期利息「${d.name}」`);
    snap(`第${periodIdx+1}期已还「${d.name}」`);
    save();
  }
}

// ========== CHANGE RECORDS ==========
function addManualRecord() {
  currentChangeIndex = -1;
  document.getElementById('changeModalTitle').textContent = '➕ 手动添加记录';
  document.getElementById('changeType').value = 'total';
  document.getElementById('changeAmount').value = '';
  document.getElementById('changeDirection').value = 'positive';
  document.getElementById('changeReason').value = '';
  openModal('changeModal');
}
function editChangeRecord(idx) {
  currentChangeIndex = idx;
  const r = changeRecords[idx];
  document.getElementById('changeModalTitle').textContent = '✏️ 编辑记录';
  document.getElementById('changeType').value = r.type;
  document.getElementById('changeAmount').value = r.amount;
  document.getElementById('changeDirection').value = r.direction;
  document.getElementById('changeReason').value = r.reason || '';
  openModal('changeModal');
}
function deleteChangeRecord(idx) {
  if (confirm('删除这条记录？')) { changeRecords.splice(idx, 1); save(); }
}
function saveChangeRecord() {
  const type = document.getElementById('changeType').value;
  const amount = parseFloat(document.getElementById('changeAmount').value);
  if (isNaN(amount) || amount <= 0) return alert('请输入有效正数');
  const direction = document.getElementById('changeDirection').value;
  const reason = document.getElementById('changeReason').value.trim();
  const rec = { type, amount, direction, reason, timestamp: Date.now() };
  if (currentChangeIndex >= 0) { rec.timestamp = changeRecords[currentChangeIndex].timestamp; changeRecords[currentChangeIndex] = rec; }
  else changeRecords.push(rec);
  closeModal('changeModal'); save();
}

// ========== RENDER ==========
function fmt(n) { return '¥' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmts(n) { return '¥' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }

const COLORS = ['#c0392b','#1a3a6b','#1a6b3c','#8a6e00','#6b1a6b'];

function renderDebtCard(d, idx, settled) {
  const det = calcDetails(d);
  const remTotal = det.remainingPrincipal + det.remainingInterest;
  const totalAll = det.remainingPrincipal + det.remainingInterest + det.paidPrincipal + det.paidInterest;
  const paidTotal = det.paidPrincipal + det.paidInterest;
  const progress = totalAll > 0 ? Math.round(paidTotal / totalAll * 100) : (settled ? 100 : 0);
  const typeMap = { normal: '普通', equal: '等额', daily: '按日' };
  const barColors = ['', 'blue-bar', 'gold-bar'];
  const typeList = ['normal', 'equal', 'daily'];
  const barClass = settled ? 'settled-bar' : (barColors[typeList.indexOf(d.type)] || '');

  const card = document.createElement('div');
  card.className = `debt-card${settled ? ' settled' : ''}`;
  card.dataset.idx = idx;

  const instRows = det.installments.map((inst, iIdx) => `
    <div class="inst-row${inst.paid ? ' paid-row' : ''}" ${!inst.paid && !settled ? `onclick="markInstPaid(${idx},${iIdx})"` : ''}>
      <span class="inst-num">${inst.period}</span>
      <span class="inst-amounts">本金 ${fmt(inst.principalPart)} | 利息 ${fmt(inst.interestPart)}</span>
      <span class="inst-status">${inst.paid ? '✅' : '⏳'}</span>
    </div>
  `).join('');

  const panelId = `inst-${idx}-${settled ? 's' : 'a'}`;
  const arrowId = `arr-${idx}-${settled ? 's' : 'a'}`;

  card.innerHTML = `
    <div class="debt-card-header">
      <div class="debt-color-bar ${barClass}"></div>
      <div class="debt-name-row">
        <div class="debt-name">
          ${d.name || '未命名'}
          <span class="type-badge ${d.type}">${typeMap[d.type] || '?'}</span>
          ${settled ? '<span class="type-badge settled">已结清</span>' : ''}
        </div>
        <div class="debt-rate">年利率 ${(d.rateAnnual || d.dailyRate || 0).toFixed(2)}% · 还款日 每月${d.repayDay || 10}日</div>
      </div>
      <div class="debt-amounts">
        <div class="debt-total${settled ? ' settled-amt' : ''}">${fmts(remTotal)}</div>
        <div class="debt-breakdown">本金 ${fmts(det.remainingPrincipal)} · 息 ${fmts(det.remainingInterest)}</div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-info"><span>已还进度 ${progress}%</span><span>已还 ${fmt(paidTotal)} / 共 ${fmt(totalAll)}</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    </div>
    <button class="installment-toggle" onclick="toggleInst('${panelId}','${arrowId}')">
      <span>📋 分期明细（${det.installments.length} 期）</span>
      <span class="toggle-arrow" id="${arrowId}">▶</span>
    </button>
    <div class="installment-panel" id="${panelId}">${instRows}</div>
    ${!settled ? `
    <div class="debt-actions">
      <button class="action-btn pay" onclick="openPayment(${idx})">💰 还款</button>
      <button class="action-btn payoff" onclick="openPayoff(${idx})">⚡ 提前结清</button>
      <button class="action-btn edit" onclick="editDebt(${idx})">✏️ 编辑</button>
      <button class="action-btn del" onclick="deleteDebt(${idx})">🗑️ 删除</button>
    </div>` : `
    <div class="debt-actions">
      <button class="action-btn del" onclick="deleteDebt(${idx})">🗑️ 删除</button>
    </div>`}
  `;
  return card;
}

function toggleInst(panelId, arrowId) {
  const panel = document.getElementById(panelId);
  const arrow = document.getElementById(arrowId);
  panel.classList.toggle('open');
  arrow.classList.toggle('open');
}

function toggleSettled() {
  const div = document.getElementById('settledDebtList');
  const arrow = document.getElementById('settledArrow');
  const open = div.style.display !== 'none';
  div.style.display = open ? 'none' : 'flex';
  arrow.style.transform = open ? '' : 'rotate(90deg)';
}

function renderChangeRecords() {
  const cont = document.getElementById('changeRecordsList');
  if (changeRecords.length === 0) {
    cont.innerHTML = '<div class="empty-state" style="padding:20px"><div class="empty-text">操作债务后自动生成记录</div></div>';
    return;
  }
  cont.innerHTML = '';
  [...changeRecords].reverse().forEach((rec, i) => {
    const origIdx = changeRecords.length - 1 - i;
    const date = new Date(rec.timestamp || Date.now());
    const timeStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
    const amtStr = (rec.direction === 'positive' ? '+' : '-') + '¥' + rec.amount.toFixed(2);
    const typeStr = rec.type === 'total' ? '总额' : '利息';
    const row = document.createElement('div');
    row.className = 'record-row';
    row.innerHTML = `
      <div class="record-dot ${rec.direction === 'positive' ? 'pos' : 'neg'}"></div>
      <div class="record-meta">
        <div style="display:flex;gap:6px;align-items:center">
          <span style="font-size:0.72rem;color:var(--ink-light)">${typeStr}</span>
          <span class="record-time">${timeStr}</span>
        </div>
        ${rec.reason ? `<div class="record-reason">${rec.reason}</div>` : ''}
      </div>
      <span class="record-amount ${rec.direction === 'positive' ? 'pos' : 'neg'}">${amtStr}</span>
      <div class="record-actions">
        <button class="record-btn" onclick="editChangeRecord(${origIdx})">✏️</button>
        <button class="record-btn" onclick="deleteChangeRecord(${origIdx})">🗑️</button>
      </div>
    `;
    cont.appendChild(row);
  });
}

function renderCalendar() {
  const today = new Date();
  const year = today.getFullYear(), month = today.getMonth();
  document.getElementById('calendarMonthYear').textContent = `${year}年${month+1}月`;
  const firstDay = new Date(year, month, 1);
  let offset = firstDay.getDay(); offset = offset === 0 ? 6 : offset - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const dayMap = {};
  debts.filter(d => !isSettled(d)).forEach(d => {
    const rd = d.repayDay || 10;
    if (rd < 1 || rd > 28) return;
    let amt = 0;
    if (d.type === 'equal' && d.principal && d.periods && (d.periodsPaid||0) < d.periods) {
      const P = d.principal, n = d.periods, r = (d.rateAnnual||0)/100/12;
      amt = r > 0 ? P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1) : P/n;
    } else if (d.type === 'daily' && d.dailyPrincipal && d.dailyPeriods && (d.dailyPaid||0) < d.dailyPeriods) {
      const P = d.dailyPrincipal, n = d.dailyPeriods, paid = d.dailyPaid||0, dr = (d.dailyRate||0)/100/365;
      amt = P/n + Math.max(0,P-paid*(P/n))*dr*30;
    } else if (d.balance > 0.01) { amt = d.balance * 0.08; }
    dayMap[rd] = (dayMap[rd]||0) + amt;
  });
  const grid = document.getElementById('calendarGrid');
  let html = '';
  for (let i = 0; i < offset; i++) html += '<div class="cal-day empty"></div>';
  for (let dd = 1; dd <= daysInMonth; dd++) {
    const isToday = dd === today.getDate();
    const has = (dayMap[dd]||0) > 0;
    let cls = 'cal-day';
    if (has) cls += ' has-debt';
    if (isToday) cls += ' today';
    html += `<div class="${cls}"><span>${dd}</span>${has ? `<span class="cal-amount">¥${Math.round(dayMap[dd])}</span>` : ''}</div>`;
  }
  const total = Math.ceil((offset + daysInMonth) / 7) * 7;
  for (let i = offset + daysInMonth; i < total; i++) html += '<div class="cal-day empty"></div>';
  grid.innerHTML = html;
}

function renderChart() {
  if (historySnapshots.length === 0) { snap('初始状态'); }
  const snaps = [...historySnapshots];
  if (snaps.length === 0) return;
  const labels = snaps.map(s => {
    const d = new Date(s.timestamp);
    return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  });
  const ctx = document.getElementById('historyChart').getContext('2d');
  if (historyChart) historyChart.destroy();
  historyChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: '剩余总额', data: snaps.map(s => s.totalGross), borderColor: '#c0392b', backgroundColor: 'rgba(192,57,43,0.05)', borderWidth: 2, tension: 0.3, fill: false, pointRadius: 2 },
        { label: '剩余利息', data: snaps.map(s => s.totalInterest), borderColor: '#1a6b3c', backgroundColor: 'rgba(26,107,60,0.05)', borderWidth: 2, tension: 0.3, fill: false, pointRadius: 2 },
        { label: '剩余本金', data: snaps.map(s => s.remainingPrincipal), borderColor: '#d4a820', backgroundColor: 'rgba(212,168,32,0.05)', borderWidth: 2, tension: 0.3, fill: false, pointRadius: 2 }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        tooltip: { callbacks: { label: c => `${c.dataset.label}: ¥${c.raw.toFixed(2)}` } },
        legend: { display: false }
      },
      scales: {
        y: { beginAtZero: true, ticks: { callback: v => '¥'+Math.round(v) }, grid: { color: 'rgba(200,191,170,0.3)' } },
        x: { ticks: { font: { size: 10 }, maxTicksLimit: 8 }, grid: { display: false } }
      }
    }
  });
}

function renderAll() {
  const activeEl = document.getElementById('activeDebtList');
  const settledEl = document.getElementById('settledDebtList');
  activeEl.innerHTML = '';
  settledEl.innerHTML = '';
  let settledCnt = 0;
  debts.forEach((d, idx) => {
    const s = isSettled(d);
    if (s) settledCnt++;
    const card = renderDebtCard(d, idx, s);
    (s ? settledEl : activeEl).appendChild(card);
  });
  if (activeEl.children.length === 0) {
    activeEl.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">暂无进行中债务，点击右上角新增</div></div>`;
  }

  const stats = getStats();
  document.getElementById('stat_totalGross').textContent = fmts(stats.totalGross);
  document.getElementById('stat_totalInterestGross').textContent = fmts(stats.totalInterest);
  document.getElementById('stat_remainingPrincipal').textContent = fmts(stats.remP);
  document.getElementById('stat_remainingInterest').textContent = fmts(stats.remI);
  document.getElementById('stat_settledCount').textContent = stats.settled + '笔';
  document.getElementById('settledCount').textContent = `(${settledCnt})`;

  renderChangeRecords();
  renderCalendar();
  renderChart();
}

// INIT
if (historySnapshots.length === 0 && debts.length > 0) snap('初始状态');
renderAll();
</script>
